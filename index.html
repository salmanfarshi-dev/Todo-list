<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Todo Game</title>
</head>
<body>
    
    <section class="container">
      <div class="content-div">
          
       <div class="main-content">
        <h1>Todo List</h1>
         <div class="input-group d-flex flex-column">
            <label for="" class="fs-4">Name</label>
            <input type="text " class="p-2 inputone" placeholder="Enter your name">
            <p class="ptag">Enter Your Name</p>
            <p class="number">Number not allowed</p>
        </div>
        <div class="input-group d-flex flex-column mt-5">
            <label for="" class="fs-4">Caption</label>
            <textarea name="" id="" class="p-2 text-area" placeholder="Enter caption"></textarea>
            <p class="p-post"></p>
        </div>
       <div class="button">
         <button class="btn btn-secondary mt-4 post">Post</button>
       </div>
        <div class="card-items d-grid mt-5">
           
        </div>
       </div>
      </div>


    </section>


    <script src="js/script.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
