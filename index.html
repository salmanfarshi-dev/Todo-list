<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Todo Game</title>
  </head>
  <body>
    <section class="container">
      <div class="content-div">
        <div class="main-content">
          <div class="content-items">
            <h1>Todo App</h1>
            <div class="input-group d-flex flex-column">
              <input
                type="text "
                class="p-2 inputone"
                placeholder="Enter your name"
              />
              <p class="ptag">Enter Your Name</p>
              <p class="number">Number not allowed</p>
            </div>
            <div class="input-group d-flex flex-column mt-5">
              <textarea
                name=""
                id=""
                class="p-2 text-area"
                placeholder="Enter caption"
              ></textarea>
              <p class="p-post"></p>
            </div>
            <div class="Button">
              <button class="btn btn-primary update">Update</button>
              <button class="btn btn-secondary post">Post</button>
            </div>
          </div>
          <div class="card-items d-grid mt-5"></div>
        </div>
      </div>
    </section>

    <script src="js/script.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
  </body>
</html>
